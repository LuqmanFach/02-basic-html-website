<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--SEO meta tags-->
    <meta name="description" content="Contact information and form for reaching out">
    <meta name="keywords" content="Contact, Information, Form">
    <title>Contact | Basic HTML Websites</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img width="64" src="logo.png" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="articles.html">Articles</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact">
            <h1>Contact Us</h1>
            <p>Have questions or feedback? Reach out to us using the form below:</p>
            <form action="#" method="post">
                <label for="name">Name:</label><br />
                <input type="text" id="name" name="name"><br />
                <label for="email">Email:</label><br />
                <input type="email" id="email" name="email"><br />
                <label for="message">Message:</label><br />
                <textarea id="message" name="message"></textarea><br />
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; all rights reserved 2025</p>
    </footer>
</body>

</html>
